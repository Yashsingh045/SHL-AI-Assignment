# Render deployment (free tier). Deploy: New + -> Blueprint -> point at this repo,
# then set the two secret env vars (GROQ_API_KEY, GEMINI_API_KEY) in the dashboard.
services:
  - type: web
    name: shl-assessment-recommender
    runtime: python
    plan: free
    # Install deps, then PREFETCH the fastembed ONNX model into .fastembed_cache at
    # build time (warmup also validates the committed index) so the first request is fast.
    buildCommand: "pip install -r requirements.txt && python -c 'from app import retrieval; retrieval.warmup()'"
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: GROQ_API_KEY          # secret — set in the Render dashboard
        sync: false
      - key: GEMINI_API_KEY        # secret — set in the Render dashboard
        sync: false
      - key: GEMINI_MODEL          # fallback model (also the code default)
        value: gemini-2.5-flash
      - key: PYTHON_VERSION
        value: "3.11.9"
